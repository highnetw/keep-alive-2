name: Supabase Keep Alive - GdMem & YouAndMe

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping GdMem DB
        run: |
          RESPONSE=$(curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/62-members?select=count&limit=1")
          echo "Response: $RESPONSE"
          echo "✅ GdMem DB Ping 완료"

      - name: Ping YouAndMe DB
        run: |
          RESPONSE=$(curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rooms?select=count&limit=1")
          echo "Response: $RESPONSE"
          echo "✅ YouAndMe DB Ping 완료"
